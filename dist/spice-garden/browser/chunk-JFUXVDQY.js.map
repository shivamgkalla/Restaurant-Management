    <div class="login-screen">
      <app-api-loader [show]="isSubmitting" [fullscreen]="true" [message]="'Signing in…'"></app-api-loader>
      <div class="login-box">
        <div class="login-logo">
          <span class="logo-icon">🌿</span>
          <h1>Spice Garden</h1>
          <p>Restaurant Management System</p>
        </div>

        <p class="quick-login-label">Login</p>
        <!-- <div class="login-quick-roles">
          <button *ngFor="let r of quickRoles" class="role-btn" (click)="quickLogin(r)">
            <div style="font-size:16px;margin-bottom:2px">{{ r.icon }}</div>
            <div>{{ r.label }}</div>
          </button>
        </div> -->

        <div class="login-divider">or enter credentials manually</div>

        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input id="username" class="form-input" type="text"
              placeholder="e.g. admin, captain1, cashier…"
              autocomplete="username"
              [(ngModel)]="username" name="username" required
              [disabled]="isSubmitting">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-input" type="password"
              placeholder="Enter password…"
              autocomplete="current-password"
              [(ngModel)]="password" name="password" required
              [disabled]="isSubmitting">
          </div>
          <div *ngIf="errorMsg" class="co-form-error" style="margin-bottom:8px">{{ errorMsg }}</div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px"
            [disabled]="isSubmitting">
            {{ isSubmitting ? 'Signing in…' : 'Sign In →' }}
          </button>
        </form>

        <!-- <div class="customer-order-banner">
          <span style="font-size:22px">🛍️</span>
          <div style="flex:1;font-size:12px;color:var(--text-secondary);line-height:1.5">
            Placing a <strong style="color:var(--text-primary)">pickup order</strong> as a customer?
          </div>
          <a [routerLink]="['/order']" class="btn btn-secondary btn-sm" style="flex-shrink:0">Order Online</a>
        </div>

        <div class="login-hint">
          <strong style="color:var(--text-secondary)">Staff credentials:</strong><br>
          admin / admin123 &nbsp;|&nbsp; manager / manager123 &nbsp;|&nbsp; captain1 / cap123<br>
          cashier / cash123 &nbsp;|&nbsp; kitchen / kitchen123
        </div> -->
      </div>
    </div>
