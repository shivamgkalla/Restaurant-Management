<div class="shell-layout" [class.shell-layout--sidebar-collapsed]="!sidebarOpen">
    <aside class="sidebar" [attr.aria-hidden]="!sidebarOpen">
      <div class="sidebar-header">
        <span class="sidebar-logo">🌿</span>
        <div>
          <div class="sidebar-title">Spice Garden</div>
          <div class="sidebar-subtitle">Restaurant OS</div>
        </div>
      </div>

      <nav class="sidebar-nav" id="app-sidebar-nav">
        <ng-container *ngFor="let item of visibleNav; let i = index">
          <div *ngIf="isFirstInSection(i)" class="nav-section-label">{{ item.section }}</div>
          <a class="nav-item"
             [routerLink]="item.route"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: false }">
            <span class="nav-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
        </ng-container>
      </nav>

      <div class="sidebar-footer" *ngIf="currentUser$ | async as user">
        <div class="user-info">
          <div class="user-avatar">{{ initials(user.name) }}</div>
          <div>
            <div class="user-name">{{ user.name }}</div>
            <span class="user-role">{{ user.role }}</span>
          </div>
        </div>
        <button class="btn btn-secondary btn-full btn-sm" (click)="logout()">🚪 Sign Out</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <button
          type="button"
          class="btn btn-secondary btn-sm sidebar-toggle"
          (click)="toggleSidebar()"
          [attr.aria-expanded]="sidebarOpen"
          aria-controls="app-sidebar-nav"
          [attr.aria-label]="sidebarOpen ? 'Hide sidebar' : 'Show sidebar'"
          [title]="sidebarOpen ? 'Hide sidebar' : 'Show sidebar'">
          <span class="sr-only">{{ sidebarOpen ? 'Hide sidebar' : 'Show sidebar' }}</span>
          <span class="sidebar-toggle-icon" aria-hidden="true">{{ sidebarOpen ? '◀' : '☰' }}</span>
        </button>
        <div class="topbar-title-wrapper">
          <div class="topbar-title">{{ pageTitle }}</div>
        </div>
        <div class="flex items-center gap-md">
          <div class="topbar-clock">{{ clock }}</div>
          <div class="topbar-divider"></div>
          <div class="topbar-location">📍 Spice Garden, Koramangala</div>
        </div>
      </header>
      <main class="page-content">
        <router-outlet></router-outlet>
      </main>
    </div>
</div>
