    <div class="login-screen">
      <app-api-loader [show]="isSubmitting" [fullscreen]="true" [message]="'Signing in…'"></app-api-loader>
      <div class="login-box">
        <div class="login-logo">
          <span class="logo-icon">🌿</span>
          <h1>Spice Garden</h1>
          <p>Restaurant Management System</p>
        </div>

        <p class="quick-login-label">Login</p>
        <!-- <div class="login-quick-roles">
          <button *ngFor="let r of quickRoles" class="role-btn" (click)="quickLogin(r)">
            <div class="role-icon">{{ r.icon }}</div>
            <div>{{ r.label }}</div>
          </button>
        </div> -->

        <div class="login-divider">or enter credentials manually</div>

        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input id="username" class="form-input" type="text"
              placeholder="e.g. admin, captain1, cashier…"
              autocomplete="username"
              [(ngModel)]="username" name="username" required
              [disabled]="isSubmitting">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-input-wrap">
              <input
                id="password"
                class="form-input"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Enter password…"
                autocomplete="current-password"
                [(ngModel)]="password"
                name="password"
                required
                [disabled]="isSubmitting"
              />
              <button
                type="button"
                class="password-toggle"
                (click)="showPassword = !showPassword"
                title="Toggle password visibility"
                [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                [attr.aria-pressed]="showPassword"
                [disabled]="isSubmitting"
              >
                <span class="sr-only">{{ showPassword ? 'Hide' : 'Show' }} password</span>
                <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <div *ngIf="errorMsg" class="co-form-error login-error">{{ errorMsg }}</div>
          <button type="submit" class="btn btn-primary btn-full btn-lg login-submit"
            [disabled]="isSubmitting">
            {{ isSubmitting ? 'Signing in…' : 'Sign In →' }}
          </button>
        </form>

        <div class="customer-order-banner">
          <span class="customer-order-icon">🛍️</span>
          <div class="customer-order-copy">
            Placing a <strong class="customer-order-highlight">pickup order</strong> as a customer?
          </div>
          <a [routerLink]="['/customer/login']" class="btn btn-secondary btn-sm customer-order-link">Order Online</a>
        </div>

     
      </div>
    </div>
